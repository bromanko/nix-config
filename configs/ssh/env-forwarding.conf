# Mutable SSH client fragment for managed hosts.
#
# This file is included from ~/.ssh/config for hosts listed in
# modules.shell.ssh.envForwarding.hosts. Edit it directly to change which
# environment variables are sent on new SSH connections; no nix rebuild or Home
# Manager activation is needed.
#
# Keep the server side broad (AcceptEnv *) only on hosts you manage. This file is
# the client-side allow-list that prevents secrets from being sent accidentally.
#
# Example:
# SendEnv ANTHROPIC_API_KEY OPENAI_API_KEY GEMINI_API_KEY GOOGLE_API_KEY
